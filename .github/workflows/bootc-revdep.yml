name: bootc Reverse Dependency CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      bootc_ref:
        description: 'bootc git ref (branch, tag, or PR ref like refs/pull/123/head)'
        required: false
        default: 'main'

env:
  CARGO_TERM_COLOR: always
  LIBVIRT_DEFAULT_URI: "qemu:///session"
  # bootc ref to test against (overridable via workflow_dispatch)
  COMPOSEFS_BOOTC_REF: ${{ github.event.inputs.bootc_ref || 'main' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-bootc-composefs:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout composefs-rs
        uses: actions/checkout@v5

      - name: Bootc Ubuntu Setup
        uses: bootc-dev/actions/bootc-ubuntu-setup@main
        with:
          libvirt: true

      - name: Install tmt
        run: |
          sudo apt-get install -y pipx
          pipx install tmt[provision]
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build and test bootc with local composefs-rs
        run: just bootc/test
